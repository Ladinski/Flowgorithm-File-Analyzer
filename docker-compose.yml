version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "P@ssw0rd123!"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    depends_on:
      - sqlserver
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=FlowgorithmAnalyzerDb;User Id=sa;Password=P@ssw0rd123!;Encrypt=false;"
    ports:
      - "5000:80"
    volumes:
      - ./Backend:/src

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://backend:5000

volumes:
  sqlserver_data:

networks:
  default:
    name: flowgorithm-network
